  <path d="M 196 54 L 164 54 L 168 70 C 170 82 174 100 176 124 C 177 138 176 150 172 162 L 190 162 C 194 150 196 136 195 120 C 194 96 192 74 190 60 L 196 60 Z"/>
  <path d="M 50 162 C 54 180 72 196 96 202 C 108 204 132 204 144 202 C 168 196 186 180 190 162 L 172 162 C 168 174 156 184 138 188 C 124 190 116 190 102 188 C 84 184 72 174 68 162 Z"/>
</g>
