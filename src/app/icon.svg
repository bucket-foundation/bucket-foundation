<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="1024" height="1024">
<defs>
  <linearGradient id="stroke" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1F1C16" stop-opacity="1"/>
    <stop offset="1" stop-color="#1F1C16" stop-opacity="0.85"/>
  </linearGradient>
  <linearGradient id="str" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0"   stop-color="#D9A43A"/>
    <stop offset="0.5" stop-color="#B8861E"/>
    <stop offset="1"   stop-color="#8A641A"/>
  </linearGradient>
  <radialGradient id="dot" cx="0.5" cy="0.45" r="0.6">
    <stop offset="0"   stop-color="#D9A43A"/>
    <stop offset="0.6" stop-color="#8A641A"/>
    <stop offset="1"   stop-color="#1F1C16"/>
  </radialGradient>
  <filter id="carve" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b"/>
    <feOffset in="b" dx="0" dy="2" result="o"/>
    <feComposite in="o" in2="SourceAlpha" operator="out" result="rim"/>
    <feMerge><feMergeNode in="rim"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- warm bone bg so the carve reads on transparent fallbacks too -->
<rect width="240" height="240" fill="#EFE8D4"/>
<g filter="url(#carve)" fill="url(#stroke)">
  <path d="M 26 48 L 214 48 L 214 54 L 26 54 Z"/>
  <path d="M 20 44 L 36 44 L 36 60 L 20 60 Z"/>
  <path d="M 204 44 L 220 44 L 220 60 L 204 60 Z"/>
